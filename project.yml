name: NovelReader
options:
  bundleIdPrefix: com.cyberzen
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    tvOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_COMPILATION_MODE: singlefile
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  NovelReader-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/NovelReaderApp
        excludes:
          - Resources/**
      - path: Sources/NovelReaderApp/Resources
    dependencies:
      - sdk: JavaScriptCore.framework
      - sdk: Security.framework
    info:
      path: Config/iOS-Info.plist
      properties:
        CFBundleDisplayName: 元阅
        CFBundleName: 元阅
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIFileSharingEnabled: true
        UISupportsDocumentBrowser: true
        LSSupportsOpeningDocumentsInPlace: true
        NSLocalNetworkUsageDescription: 用于发现并连接家中的 NAS 服务。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _webdav._tcp
          - _http._tcp
          - _smb._tcp
          - _ssh._tcp
        CFBundleDocumentTypes:
          - CFBundleTypeName: Novel files
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.plain-text
              - org.idpf.epub-container
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberzen.reader
        CODE_SIGN_ENTITLEMENTS: Config/iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NovelReader-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/NovelReaderApp
        excludes:
          - Resources/**
      - path: Sources/NovelReaderApp/Resources
        excludes:
          - LaunchScreen.storyboard
    dependencies:
      - sdk: JavaScriptCore.framework
      - sdk: Security.framework
    info:
      path: Config/macOS-Info.plist
      properties:
        CFBundleDisplayName: 元阅
        CFBundleName: 元阅
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSLocalNetworkUsageDescription: 用于发现并连接家中的 NAS 服务。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _webdav._tcp
          - _http._tcp
          - _smb._tcp
          - _ssh._tcp
        CFBundleDocumentTypes:
          - CFBundleTypeName: Novel files
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.plain-text
              - org.idpf.epub-container
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberzen.reader.macos
        CODE_SIGN_ENTITLEMENTS: Config/macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NovelReader-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Sources/NovelReaderTVApp
      - path: Sources/NovelReaderApp/Resources
        excludes:
          - LaunchScreen.storyboard
          - README.txt
    dependencies:
      - sdk: Security.framework
    info:
      path: Config/tvOS-Info.plist
      properties:
        CFBundleDisplayName: 元阅
        CFBundleName: 元阅
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSLocalNetworkUsageDescription: 用于连接家中的阅读服务器。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _http._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cyberzen.reader.tvos
        TARGETED_DEVICE_FAMILY: "3"
schemes:
  NovelReader-iOS:
    build:
      targets:
        NovelReader-iOS: all
    run:
      config: Debug
  NovelReader-macOS:
    build:
      targets:
        NovelReader-macOS: all
    run:
      config: Debug
  NovelReader-tvOS:
    build:
      targets:
        NovelReader-tvOS: all
    run:
      config: Debug
